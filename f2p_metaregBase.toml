template = '''

Below is code from selected R projects from my repbox / metareg toolbox.

Main role of the packages below:

regtranslate: translate regressions from Stata to R

repboxDRF: convert Stata code in a reproduction package into a
  "direct replication format" that allows to generate both Stata and R
  scripts that load data sets, perform data modifications and then
  can run original regression code or a modification of it.

metaregBase: A run of all regression based on the direct replication format. Goal

1. Stata run that stores all sort of relevant information for the regression, like
 coefficients, scalars etc.

2. An R run that first stores parsed representation of regression as regdb parcels,
e.g. cmdpart, then runs translated version of that regression and stores R output
as parcels.

metaregTools: tools for further metareg studies that will use parcels generated by
metaregBase and structure of repboxDRF. Example for such a study: check how p-values
change if robust standard errors are switched from HC1 to HC3, e.g. need to generate
Stata or R code that re-runs modified versions of regressions.

Currently, the structure is not yet well done. We had an old version, with much
monolithic code that is still in metaregBase (old package name repboxReg) that
was fairly complex. metaregTools is also somewhat outdated. Newest package is repboxDRF.

Next steps:

- Update metaregBase and to some extend metaregTools to new structure.

# Package repboxDRF

{{repboxDRF}}

# Package regtranslate

{{regtranslate}}

# Package metaregTools

{{metaregTools}}

